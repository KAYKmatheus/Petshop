<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

 <header>
    <h2> <span class="heart">❤</span> MediPet</h2>
    
    <nav>
        <a href="index.html" class="linkSimples">Home</a>
        <a href="agendamento.html" class="linkSimples">Agendamento</a>
        <a href="#contato" class="linkSimples">Contato</a>
        <a href="adm.html" class="linkSimples">ADMIN</a>
    </nav>

    <nav id="navUsuario" style="display: flex; gap: 12px; align-items: center;">
        </nav>    
 </header> 

 <main>
    <section class="sessao1">
        <div class="container1">
            <h1>Cuide do seu pet com quem entende</h1>
            <p>Agende consultas veterinárias com praticidade e segurança.</p>
            <a href="agendamento.html" class="botao">Agendar Agora ➔</a>
        </div>
    </section>
    </main>

 <script>
    // Lógica para detectar login e trocar botões
    const navUsuario = document.getElementById('navUsuario');
    const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    const petNome = localStorage.getItem('petNomeLogado');

    if (usuarioLogado) {
        // Usuário logado: mostra nome e botão sair
        navUsuario.innerHTML = `
            <span style="font-size: 0.9rem; color: #555;">Olá, <strong>${usuarioLogado.nome}</strong> (${petNome})</span>
            <button onclick="logout()" class="botao" style="background: #e74c3c; border:none; cursor:pointer;">Sair</button>
        `;
    } else {
        // Usuário não logado: mostra botões de acesso
        navUsuario.innerHTML = `
            <a href="cadastro.html" class="botao">Cadastrar-se</a>
            <a href="login.html" class="botao">Entrar</a>
        `;
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
 </script>
</body>
</html>
