<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediPet</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="login-container">
        
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fa-solid fa-heart"></i>
            </div>
            <h2>MediPet</h2>
        </div>

        <div class="login-card">
            <div class="topo-card-login">
                <h1>Bem-vindo de volta!</h1>
                <p>Entre para continuar cuidando do seu pet</p>
            </div>

            <form id="formLogin">
                
                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope icone-esq"></i>
                        <input type="email" id="emailLogin" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icone-esq"></i>
                        <input type="password" id="senhaLogin" placeholder="••••••••" required>
                        <i class="fa-regular fa-eye icone-dir"></i>
                    </div>
                </div>

                <div class="opcoes-login">
                    <label class="lembrar-me">
                        <input type="checkbox"> Lembrar-me
                    </label>
                    <a href="#" class="link-destaque">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn-principal" id="btnEntrar">
                    Entrar <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div class="divisor">
                    <span>ou</span>
                </div>

                <p class="texto-rodape-card">
                    Ainda não tem conta? <a href="cadastro.html" class="link-destaque">Cadastre-se gratuitamente</a>
                </p>

            </form>
        </div>

    </main>

    <script>
        const form = document.getElementById('formLogin');
        const BASE_URL = "http://localhost:8080";

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const btn = document.getElementById('btnEntrar');
            btn.innerHTML = 'Entrando... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const email = document.getElementById('emailLogin').value;
            const senha = document.getElementById('senhaLogin').value;

            try {
                const res = await fetch(`${BASE_URL}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (res.ok) {
                    const usuario = await res.json();
                    
                    // Salva o usuário no navegador
                    localStorage.setItem('usuarioLogado', JSON.stringify(usuario));

                    // Simula os dados do Pet vinculado
                    localStorage.setItem('petIdLogado', 1); 
                    localStorage.setItem('petNomeLogado', 'Thor');

                    window.location.href = 'agendamento.html';
                } else {
                    const erroMsg = await res.text();
                    alert("Erro: " + erroMsg);
                    btn.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
                btn.innerHTML = 'Entrar <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
